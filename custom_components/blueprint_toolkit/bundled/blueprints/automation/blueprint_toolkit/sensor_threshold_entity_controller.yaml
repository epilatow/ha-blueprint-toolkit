blueprint:
  name: Sensor Threshold Entity Controller
  description: >
    Controls one or more entities based on sensor value spikes (e.g.,
    humidity for a bathroom fan). Turns the entities ON when sensor
    readings spike above a trigger threshold, OFF when they drop below a
    release threshold. Includes manual override protection, double-off
    disable, auto-off timer for manual activation, and optional
    notifications.
    [Full documentation](/local/blueprint_toolkit/docs/sensor_threshold_entity_controller.html).
  domain: automation
  author: epilatow

  input:
    controlled_entities:
      name: Controlled Entities
      description: >
        One or more switch, fan, light, or input_boolean entities to
        control. They are driven on and off together as a unit.
      selector:
        entity:
          domain:
            - switch
            - fan
            - light
            - input_boolean
          multiple: true

    sensor_entities:
      name: Sensor Entities
      description: >
        One or more sensors to monitor (e.g., humidity
        sensors). All sensors feed into a shared sampling
        window. Any sensor spike triggers the switch; all
        must settle to release.
      selector:
        entity:
          domain: sensor
          multiple: true

    trigger_threshold:
      name: Trigger Threshold
      description: >
        Sensor spike amount (max - min) to turn switch ON.
      default: 10
      selector:
        number:
          mode: box

    release_threshold:
      name: Release Threshold
      description: >
        Amount above baseline to keep switch ON. Must be
        less than or equal to trigger threshold.
      default: 5
      selector:
        number:
          mode: box

    sampling_window_s:
      name: Sampling Window (seconds)
      description: >
        Rolling window for sensor min/max calculation.
      default: 300
      selector:
        number:
          min: 10
          max: 3600
          unit_of_measurement: seconds
          mode: box

    disable_window_s:
      name: Disable Window (seconds)
      description: >
        Time window for double-off detection. Two manual
        switch-off operations within this window disable the
        sensor override. Set to 0 to disable this feature.
      default: 10
      selector:
        number:
          min: 0
          max: 60
          unit_of_measurement: seconds
          mode: box

    auto_off_min:
      name: Auto-Off Timeout (minutes)
      description: >
        Minutes before auto-off after manual switch activation.
        Set to 0 to disable auto-off.
      default: 30
      selector:
        number:
          min: 0
          max: 1440
          unit_of_measurement: minutes
          mode: box

    notify_action:
      name: Notification Action (optional)
      description: >
        Action(s) to run for notifications. Pick one or
        more "Call service" steps (e.g.
        notify.mobile_app_phone, notify.all, a notify
        group). Each step receives the pre-built
        notification body via a ``message`` variable;
        your step's data should reference ``{{ message }}``.
        Leave empty to disable notifications.
      default: []
      selector:
        action:

    notification_prefix:
      name: Notification Prefix (optional)
      description: >
        Text prepended to notifications. Supports timestamp
        tokens: YYYY, YY, MM, DD, HH, mm, ss.
      default: "STEC: "
      selector:
        text:

    notification_suffix:
      name: Notification Suffix (optional)
      description: >
        Text appended to notifications. Supports timestamp
        tokens: YYYY, YY, MM, DD, HH, mm, ss.
      default: " at YYYY-MM-DD HH:mm:ss"
      selector:
        text:

    debug_logging:
      name: Debug Logging
      description: >
        Enable debug logging. When enabled, emits a
        log.warning message with full decision context
        on every invocation. Check Settings > System >
        Logs to view output.
      default: false
      selector:
        boolean:

triggers:
  # Reactive triggers only (sensor + controlled-entity
  # state changes); the periodic minute-tick is owned by
  # the integration's ``schedule_periodic_with_jitter``
  # plumbing.
  - id: sensor_change
    trigger: state
    entity_id: !input sensor_entities
  - id: switch_change
    trigger: state
    entity_id: !input controlled_entities

actions:
  - action: blueprint_toolkit.sensor_threshold_entity_controller
    # Synthetic invocations from the integration
    # (periodic timer, restart-recovery + reload-recovery
    # kicks) pass ``trigger_id`` + ``trigger_entity`` as
    # flat top-level variables since HA's
    # ``automation.trigger`` service strips the
    # ``trigger`` key from caller variables. Defaults
    # cover the reactive-trigger paths
    # (``sensor_change`` / ``switch_change``); the
    # ``trigger.entity_id`` default of ``"timer"`` keeps
    # the logic module's ``determine_event_type``
    # mapping the periodic / kick paths to
    # ``EventType.TIMER``.
    data:
      instance_id: "{{ this.entity_id }}"
      controlled_entities_raw: !input controlled_entities
      trigger_id: "{{ trigger_id | default(trigger.id, true) | default('manual', true) }}"
      sensor_value: >-
        {{ trigger.to_state.state
           if trigger.to_state is defined
           else '' }}
      trigger_entity: >-
        {{ trigger_entity | default(trigger.entity_id, true) | default('timer', true) }}
      trigger_threshold_raw: !input trigger_threshold
      release_threshold_raw: !input release_threshold
      sampling_window_seconds_raw: !input sampling_window_s
      disable_window_seconds_raw: !input disable_window_s
      auto_off_minutes_raw: !input auto_off_min
      notification_prefix: !input notification_prefix
      notification_suffix: !input notification_suffix
      debug_logging_raw: !input debug_logging
    # The handler returns a ServiceResponse mapping that
    # carries the pre-built notification body when the
    # decision called for one (and an empty / absent
    # ``notification_message`` on no-op evaluations).
    response_variable: result
  # Run the user-supplied notify action only when the
  # handler emitted a non-empty message. ``message`` is
  # exposed as a top-level variable inside the user's
  # action sequence so each step can reference
  # ``{{ message }}`` in its ``data:`` block.
  - choose:
      - conditions:
          - "{{ result.notification_message | default('') != '' }}"
        sequence:
          - variables:
              message: "{{ result.notification_message }}"
          - sequence: !input notify_action

# ``queued`` + ``max: 10`` lets up to 10 trigger events
# (sensor changes + switch state changes + the
# integration's minute-tick kicks) stack up and run in
# order. Beyond 10, HA drops new events with a warning
# in the log -- bump if a noisy sensor pushes against
# the cap.
mode: queued
max: 10
